<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Asadullah's Blog</title>

  <!-- Global Fonts & Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Core Bootstrap 5 CSS Framework -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Application Custom Global Overrides -->
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
    }
    .navbar-modern {
      background: rgba(255, 255, 255, 0.8) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
    }
    .nav-link-modern {
      font-weight: 500;
      color: #334155 !important;
      font-size: 0.95rem;
      padding: 0.5rem 1rem !important;
      transition: color 0.2s ease;
    }
    .nav-link-modern:hover {
      color: #0f172a !important;
    }
    .masthead {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .form-control {
  font-size: 1rem !important;
  padding: 0.6rem 0.75rem !important;
  border-radius: 8px !important;
  border: 1px solid #e2e8f0 !important;
  background-color: #f8fafc !important;
  box-shadow: none !important;
  transition: border-color 0.2s ease, background-color 0.2s ease !important;
}
.form-control:focus {
  border-color: #94a3b8 !important;
  background-color: #ffffff !important;
}
.form-label {
  font-weight: 600 !important;
  color: #475569 !important;
  font-size: 0.85rem !important;
  text-transform: uppercase !important;
  letter-spacing: 0.5px !important;
  margin-bottom: 0.4rem !important;
}
  </style>
</head>

<body>

  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-light fixed-top navbar-modern py-3">
    <div class="container">
      <a class="navbar-brand fw-bold text-dark fs-4" href="{{ url_for('get_all_posts') }}" style="letter-spacing: -0.5px;">
        Asadullah<span class="text-secondary">.dev</span>
      </a>
      <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarResponsive">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center gap-1">
          <li class="nav-item">
            <a class="nav-link nav-link-modern" href="{{ url_for('get_all_posts') }}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-link-modern" href="{{ url_for('about') }}">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-link-modern" href="{{ url_for('contact') }}">Contact</a>
          </li>

          <!-- Contextual User Authentication Links -->
          {% if not current_user.is_authenticated %}
          <li class="nav-item ms-lg-2">
            <a class="nav-link nav-link-modern text-dark" href="{{ url_for('login') }}">Login</a>
          </li>
          <li class="nav-item ms-lg-1">
            <a class="btn btn-dark btn-sm rounded-pill px-4 shadow-sm" href="{{ url_for('register') }}" style="font-size: 0.9rem; padding: 0.4rem 1rem;">Register</a>
          </li>
          {% else %}
          <li class="nav-item ms-lg-2">
            <a class="btn btn-outline-danger btn-sm rounded-pill px-4" href="{{ url_for('logout') }}" style="font-size: 0.9rem; padding: 0.4rem 1rem;">Logout</a>
          </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>
